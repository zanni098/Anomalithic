name: Release Desktop

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build native
# installers for Windows (.msi), macOS (.dmg), and Linux (.deb / AppImage) and
# attach them to a draft GitHub Release. Also runnable manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Generate app icons
        run: pnpm --filter @anomalithic/desktop exec tauri icon app-icon.png

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'desktop-dev' }}
          releaseName: "Anomalithic ${{ github.ref_name }}"
          releaseBody: "Native installers — Windows .msi, macOS .dmg, Linux .deb / AppImage."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
