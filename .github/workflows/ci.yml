name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The runtime packages are the unit of CI. The web app (Vercel) and the
      # desktop app (tauri release workflow) are validated by their own pipelines.
      - name: Lint
        run: pnpm exec biome check packages

      - name: Typecheck
        run: pnpm typecheck --filter "./packages/*"

      - name: Build
        run: pnpm build --filter "./packages/*"

      - name: Test
        run: pnpm test --filter "./packages/*"
