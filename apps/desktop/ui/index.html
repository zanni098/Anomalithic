<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anomalithic</title>
    <style>
      :root {
        --bg: #07070a;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.09);
        --text: #ecedf2;
        --muted: #9a9bb2;
        --accent: #59e6c7;
        --accent2: #f5b14c;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        grid-template-columns: 248px 1fr;
        font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        background-image:
          radial-gradient(700px 420px at 90% -10%, rgba(139, 123, 255, 0.12), transparent 60%),
          radial-gradient(700px 460px at -10% 0%, rgba(89, 230, 199, 0.1), transparent 55%);
      }
      .mono { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; }
      .rail {
        border-right: 1px solid var(--border);
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: 0.18em; font-size: 0.8rem; }
      .glyph { width: 10px; height: 22px; border-radius: 3px; background: linear-gradient(180deg, var(--accent), #8b7bff); box-shadow: 0 0 14px rgba(89, 230, 199, 0.5); }
      nav { display: flex; flex-direction: column; gap: 4px; }
      nav a { color: var(--muted); text-decoration: none; padding: 8px 10px; border-radius: 8px; font-size: 0.9rem; }
      nav a:hover, nav a.active { background: var(--panel); color: var(--text); }
      .rt { margin-top: auto; color: #62647a; font-size: 0.72rem; border-top: 1px solid var(--border); padding-top: 14px; }
      main { display: flex; flex-direction: column; min-width: 0; }
      header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
      header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
      select { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 0.85rem; }
      .console { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
      .msg { max-width: 70ch; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.92rem; line-height: 1.6; }
      .msg.sys { color: var(--muted); background: var(--panel); }
      .msg.user { align-self: flex-end; background: rgba(89, 230, 199, 0.08); border-color: rgba(89, 230, 199, 0.25); }
      form { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }
      input[type="text"] { flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 0.95rem; outline: none; }
      input[type="text"]:focus { border-color: rgba(89, 230, 199, 0.4); }
      button { background: var(--accent); color: #04211b; border: none; border-radius: 10px; padding: 0 18px; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <aside class="rail">
      <div class="brand"><span class="glyph"></span> ANOMALITHIC</div>
      <nav>
        <a class="active" href="#">Session</a>
        <a href="#">Skills</a>
        <a href="#">Memory</a>
        <a href="#">Agents</a>
        <a href="#">Earn</a>
        <a href="#">Settings</a>
      </nav>
      <div class="rt mono" id="rt">connecting…</div>
    </aside>
    <main>
      <header>
        <h1>Session</h1>
        <select id="model" aria-label="model">
          <option>claude-sonnet-4-6</option>
          <option>gpt-4o-mini</option>
          <option>llama3.1 (ollama)</option>
        </select>
      </header>
      <section class="console" id="log">
        <div class="msg sys">
          Welcome to Anomalithic Desktop. Start the local runtime with
          <strong> anomalithic serve</strong> (set a provider key in your .env), then chat below —
          the agent, MCP, skills, hooks, and memory all run on your machine.
        </div>
      </section>
      <form id="composer">
        <input type="text" name="q" placeholder="Ask the agent to build, fix, or research something…" autocomplete="off" />
        <button type="submit">Run</button>
      </form>
    </main>
    <script>
      const log = document.getElementById("log");
      function add(role, text) {
        const el = document.createElement("div");
        el.className = "msg " + role;
        el.textContent = text;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
      }
      const RUNTIME = "http://127.0.0.1:4517";
      document.getElementById("composer").addEventListener("submit", async (e) => {
        e.preventDefault();
        const input = e.target.q;
        const value = input.value.trim();
        if (!value) return;
        add("user", value);
        input.value = "";
        add("sys", "✦ thinking…");
        try {
          const res = await fetch(RUNTIME + "/run", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ prompt: value }),
          });
          if (!res.ok) throw new Error("runtime " + res.status);
          const data = await res.json();
          log.removeChild(log.lastChild);
          add("assistant", data.text || "(no output)");
        } catch (_err) {
          log.removeChild(log.lastChild);
          add("sys", "Runtime not reachable. Start it with:  anomalithic serve");
        }
      });
      (async () => {
        try {
          const { invoke } = window.__TAURI__.core;
          const info = await invoke("runtime_info");
          document.getElementById("rt").textContent =
            info.name + " " + info.version + " · " + info.os + "/" + info.arch;
        } catch (err) {
          document.getElementById("rt").textContent = "runtime: web preview";
        }
      })();
    </script>
  </body>
</html>
